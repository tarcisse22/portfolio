<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaLiga Live Table</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #132238;
      --muted: #5c6b80;
      --accent: #0a6cff;
      --line: #dce3ee;
      --good: #0c8a43;
      --warn: #a05600;
      --bad: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(160deg, #f5f109 0%, #d8c008 45%, #d1f408 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(10, 25, 50, 0.06);
      overflow: hidden;
    }

    .clock-card {
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    /* ✅ Back Button Style */
    .back-btn {
      display: inline-block;
      margin-top: 10px;
      margin-bottom: 10px;
      text-decoration: none;
      background: #ffffff;
      border: 1px solid var(--line);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      color: var(--text);
      transition: 0.2s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }

    #date {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    #clock {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .table-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .table-head h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .status {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: center;
      white-space: nowrap;
      font-size: 0.95rem;
    }

    th {
      background: #f1f5fb;
      color: #2a3b55;
      font-weight: 700;
    }

    td.team {
      text-align: left;
      font-weight: 600;
    }

    tr:nth-child(even) { background: #fbfdff; }

    .pos-1, .pos-2, .pos-3, .pos-4 { color: var(--good); font-weight: 700; }
    .pos-5, .pos-6 { color: var(--warn); font-weight: 700; }
    .pos-18, .pos-19, .pos-20 { color: var(--bad); font-weight: 700; }

    .error {
      margin: 0;
      padding: 12px 16px;
      border-top: 1px solid #f7d3d0;
      background: #fff5f4;
      color: #842029;
      font-size: 0.92rem;
      display: none;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      #clock { font-size: 1.8rem; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card clock-card">
      <h1>LaLiga Live Dashboard</h1>

      <!-- ✅ Back Button Added -->
      <a class="back-btn" href="index.html">← Back to Portfolio</a>

      <div id="date">Loading date...</div>
      <div id="clock">00:00:00</div>
      <div id="season" class="meta">Season: -</div>
      <div id="updated" class="meta">Last update: -</div>
    </section>

    <!-- Rest of your file remains unchanged -->
