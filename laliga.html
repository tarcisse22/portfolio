<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaLiga Live Table</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #132238;
      --muted: #5c6b80;
      --accent: #0a6cff;
      --line: #dce3ee;
      --good: #0c8a43;
      --warn: #a05600;
      --bad: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(160deg, #f5f109 0%, #d8c008 45%, #d1f408 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(10, 25, 50, 0.06);
      overflow: hidden;
    }

    .clock-card {
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    #date {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    #clock {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .table-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .table-head h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .status {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: center;
      white-space: nowrap;
      font-size: 0.95rem;
    }

    th {
      background: #f1f5fb;
      color: #2a3b55;
      font-weight: 700;
    }

    td.team {
      text-align: left;
      font-weight: 600;
    }

    tr:nth-child(even) { background: #fbfdff; }

    .pos-1, .pos-2, .pos-3, .pos-4 { color: var(--good); font-weight: 700; }
    .pos-5, .pos-6 { color: var(--warn); font-weight: 700; }
    .pos-18, .pos-19, .pos-20 { color: var(--bad); font-weight: 700; }

    .error {
      margin: 0;
      padding: 12px 16px;
      border-top: 1px solid #f7d3d0;
      background: #fff5f4;
      color: #842029;
      font-size: 0.92rem;
      display: none;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      #clock { font-size: 1.8rem; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card clock-card">
      <h1>LaLiga Live Dashboard</h1>
      <div id="date">Loading date...</div>
      <div id="clock">00:00:00</div>
      <div id="season" class="meta">Season: -</div>
      <div id="updated" class="meta">Last update: -</div>
    </section>

    <section class="card">
      <div class="table-head">
        <h2>LaLiga Standings (Live)</h2>
        <div id="status" class="status">Loading standings...</div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th>Team</th>
              <th>P</th>
              <th>W</th>
              <th>D</th>
              <th>L</th>
              <th>GF</th>
              <th>GA</th>
              <th>GD</th>
              <th>Pts</th>
            </tr>
          </thead>
          <tbody id="standings-body">
            <tr>
              <td colspan="10">Loading data...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <p id="error" class="error"></p>
    </section>
  </main>

  <script>
    // TheSportsDB LaLiga league ID and free demo key.
    const LALIGA_LEAGUE_ID = 4335;
    const API_KEY = "123";
    const EXPECTED_TEAMS = 20;

    // Refresh standings frequently so table updates after posted match results.
    const REFRESH_MS = 60000;

    const dateEl = document.getElementById("date");
    const clockEl = document.getElementById("clock");
    const seasonEl = document.getElementById("season");
    const updatedEl = document.getElementById("updated");
    const statusEl = document.getElementById("status");
    const bodyEl = document.getElementById("standings-body");
    const errorEl = document.getElementById("error");

    function getCurrentSeasonLabel(now = new Date()) {
      // European football season: starts around July/August and ends next year.
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const start = month >= 7 ? year : year - 1;
      return `${start}-${start + 1}`;
    }

    function updateClock() {
      const now = new Date();

      dateEl.textContent = now.toLocaleDateString(undefined, {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });

      clockEl.textContent = now.toLocaleTimeString(undefined, {
        hour12: false
      });
    }

    function renderRows(tableData) {
      if (!Array.isArray(tableData) || tableData.length === 0) {
        bodyEl.innerHTML = `<tr><td colspan="10">No standings data found.</td></tr>`;
        return;
      }

      bodyEl.innerHTML = tableData
        .sort((a, b) => Number(a.intRank) - Number(b.intRank))
        .map((row) => {
          const rank = Number(row.intRank || 0);
          const posClass = `pos-${rank}`;
          const gd = Number(row.intGoalDifference || 0);
          const gdText = gd > 0 ? `+${gd}` : `${gd}`;

          return `
            <tr>
              <td class="${posClass}">${rank}</td>
              <td class="team">${row.strTeam || "Unknown"}</td>
              <td>${row.intPlayed || 0}</td>
              <td>${row.intWin || 0}</td>
              <td>${row.intDraw || 0}</td>
              <td>${row.intLoss || 0}</td>
              <td>${row.intGoalsFor || 0}</td>
              <td>${row.intGoalsAgainst || 0}</td>
              <td>${gdText}</td>
              <td><strong>${row.intPoints || 0}</strong></td>
            </tr>
          `;
        })
        .join("");
    }

    function normalizeSportsDbRows(rows) {
      return (rows || []).map((row) => ({
        rank: Number(row.intRank || 0),
        team: row.strTeam || "Unknown",
        played: Number(row.intPlayed || 0),
        won: Number(row.intWin || 0),
        drawn: Number(row.intDraw || 0),
        lost: Number(row.intLoss || 0),
        gf: Number(row.intGoalsFor || 0),
        ga: Number(row.intGoalsAgainst || 0),
        gd: Number(row.intGoalDifference || 0),
        points: Number(row.intPoints || 0)
      }));
    }

    function getEspnStat(stats, name) {
      const hit = (stats || []).find((s) => s.name === name);
      return hit ? Number(hit.value || 0) : 0;
    }

    function normalizeEspnRows(entries) {
      return (entries || []).map((entry) => {
        const stats = entry.stats || [];
        return {
          rank: getEspnStat(stats, "rank"),
          team: entry.team?.displayName || "Unknown",
          played: getEspnStat(stats, "gamesPlayed"),
          won: getEspnStat(stats, "wins"),
          drawn: getEspnStat(stats, "ties"),
          lost: getEspnStat(stats, "losses"),
          gf: getEspnStat(stats, "pointsFor"),
          ga: getEspnStat(stats, "pointsAgainst"),
          gd: getEspnStat(stats, "pointDifferential"),
          points: getEspnStat(stats, "points")
        };
      });
    }

    function renderNormalizedRows(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        bodyEl.innerHTML = `<tr><td colspan="10">No standings data found.</td></tr>`;
        return;
      }

      bodyEl.innerHTML = rows
        .sort((a, b) => a.rank - b.rank)
        .map((row) => {
          const posClass = `pos-${row.rank}`;
          const gdText = row.gd > 0 ? `+${row.gd}` : `${row.gd}`;
          return `
            <tr>
              <td class="${posClass}">${row.rank}</td>
              <td class="team">${row.team}</td>
              <td>${row.played}</td>
              <td>${row.won}</td>
              <td>${row.drawn}</td>
              <td>${row.lost}</td>
              <td>${row.gf}</td>
              <td>${row.ga}</td>
              <td>${gdText}</td>
              <td><strong>${row.points}</strong></td>
            </tr>
          `;
        })
        .join("");
    }

    async function fetchEspnStandings() {
      const url = "https://site.api.espn.com/apis/v2/sports/soccer/esp.1/standings";
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`ESPN HTTP ${response.status}`);
      }
      const data = await response.json();
      const entries = data?.children?.[0]?.standings?.entries || [];
      return normalizeEspnRows(entries);
    }

    async function fetchSportsDbStandings(season) {
      const url = `https://www.thesportsdb.com/api/v1/json/${API_KEY}/lookuptable.php?l=${LALIGA_LEAGUE_ID}&s=${season}`;
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`TheSportsDB HTTP ${response.status}`);
      }
      const data = await response.json();
      return normalizeSportsDbRows(data.table || []);
    }

    async function loadStandings() {
      const season = getCurrentSeasonLabel();
      seasonEl.textContent = `Season: ${season}`;
      statusEl.textContent = "Refreshing standings...";
      errorEl.style.display = "none";

      try {
        let rows = [];
        let source = "";

        try {
          rows = await fetchEspnStandings();
          source = "ESPN";
        } catch (espnErr) {
          rows = await fetchSportsDbStandings(season);
          source = "TheSportsDB";
        }

        renderNormalizedRows(rows);

        const now = new Date();
        updatedEl.textContent = `Last update: ${now.toLocaleString()}`;
        statusEl.textContent = `Live data loaded from ${source} (${rows.length}/${EXPECTED_TEAMS} teams)`;

        if (rows.length < EXPECTED_TEAMS) {
          errorEl.textContent = `Only ${rows.length} teams were returned by ${source}. This usually means API limits. Add your own API key if needed.`;
          errorEl.style.display = "block";
        }
      } catch (err) {
        statusEl.textContent = "Could not refresh standings";
        errorEl.textContent = `Failed to load live LaLiga data. ${err.message}`;
        errorEl.style.display = "block";
      }
    }

    updateClock();
    setInterval(updateClock, 1000);

    loadStandings();
    setInterval(loadStandings, REFRESH_MS);
  </script>
</body>
</html>
